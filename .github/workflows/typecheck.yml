name: TypeScript Compile Checkon:  push:    branches: [ main ]  pull_request:    branches: [ main ]jobs:  compile-check:    runs-on: ubuntu-latest    steps:      - name: Checkout code        uses: actions/checkout@v4      - name: Setup Node.js        uses: actions/setup-node@v4        with:          node-version: '20'      - name: Install TypeScript        run: npm install -g typescript      - name: Run TypeScript Compiler        run: tsc --noEmit
